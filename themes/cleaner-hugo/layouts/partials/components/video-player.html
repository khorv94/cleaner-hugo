{{ $video := . }}
<div class="md:w-[40%] w-full relative video-player-container" data-aos="zoom-in-sm">
  {{ partial "image" (dict
    "Src" $video.thumbnail
    "Alt" "video thumbnail"
    "Width" 300
    "Height" 500
    "Class" "w-full h-full min-h-full object-cover"
  ) }}

  <svg
    class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 z-10 cursor-pointer w-3/12 text-secondary video-play-button"
    xmlns="http://www.w3.org/2000/svg"
    width="124"
    height="124"
    fill="none"
    viewBox="0 0 124 124"
    data-aos="zoom-in-sm"
    data-aos-delay="100"
    data-video-url="{{ $video.url | absURL }}">
    <circle cx="62" cy="62" r="62" fill="currentcolor" />
    <path
      class="text-black"
      fill="currentcolor"
      d="M71.692 61.948 57.32 52.153c-.536-.364-1.321-.036-1.321.551v19.592c0 .587.785.915 1.32.551l14.372-9.795c.41-.28.41-.823 0-1.104"
    />
  </svg>
</div>

<div id="video-modal-{{ $video.url | sha256 | truncate 8 }}" class="video-modal fixed inset-0 bg-black/90 flex items-center justify-center z-[9999] transition-opacity duration-500 ease-in-out opacity-0 pointer-events-none">
  <div class="relative w-[95%] max-w-xl aspect-video transition-all duration-500 ease-in-out transform scale-95 opacity-0">
    <!-- Close button -->
    <button class="absolute -top-12 right-0 text-white hover:text-gray-300 text-2xl z-10 video-close-button">
      <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
      </svg>
    </button>
    <iframe
      width="100%"
      height="100%"
      src=""
      title="Video Player"
      allow="autoplay; encrypted-media"
      allowfullscreen
      class="rounded-lg shadow-lg video-iframe"></iframe>
  </div>
</div>


  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const playButtons = document.querySelectorAll('.video-play-button');

      playButtons.forEach((playButton) => {
        const videoUrl = playButton.getAttribute('data-video-url');
        // Create a simple hash from the video URL
        const modalId = 'video-modal-' + videoUrl.split('').reduce((a, b) => {
          a = ((a << 5) - a) + b.charCodeAt(0);
          return a & a;
        }, 0).toString().replace('-', '').substring(0, 8);

        const modal = document.getElementById(modalId) || document.querySelector('.video-modal');

        if (!modal) return;

        const iframe = modal.querySelector('.video-iframe');
        const closeButton = modal.querySelector('.video-close-button');

        // Open video modal
        playButton.addEventListener('click', function() {
          modal.classList.remove('opacity-0', 'pointer-events-none');
          modal.classList.add('opacity-100');

          const modalContent = modal.querySelector('div');
          modalContent.classList.remove('scale-95', 'opacity-0');
          modalContent.classList.add('scale-100', 'opacity-100');

          iframe.src = videoUrl;
          document.body.style.overflow = 'hidden';
        });

        // Close on close button click
        if (closeButton) {
          closeButton.addEventListener('click', function() {
            closeModal();
          });
        }

        // Close on background click
        modal.addEventListener('click', function(e) {
          if (e.target === modal) {
            closeModal();
          }
        });

        function closeModal() {
          modal.classList.add('opacity-0', 'pointer-events-none');
          modal.classList.remove('opacity-100');

          const modalContent = modal.querySelector('div');
          modalContent.classList.add('scale-95', 'opacity-0');
          modalContent.classList.remove('scale-100', 'opacity-100');

          iframe.src = '';
          document.body.style.overflow = '';
        }

        // Close on ESC key
        document.addEventListener('keydown', function(e) {
          if (e.key === 'Escape' && !modal.classList.contains('opacity-0')) {
            closeModal();
          }
        });
      });
    });
  </script>
